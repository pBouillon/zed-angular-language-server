# "Angular" is a keyword recognized by Zed's built-in TypeScript injections
# (PR #44180, Zed v0.218.0): when it finds @Component({ template: `...` })
# in a .ts file, it looks for a language named exactly "Angular" to highlight
# the template content. This extension registers that language.
name = "Angular"

grammar = "angular"

path_suffixes = ["html", "component.html"]
block_comment = ["<!-- ", " -->"]

prettier_parser_name = "angular"

brackets = [
  { start = "(",  end = ")",  close = true,  newline = false },
  { start = "[",  end = "]",  close = true,  newline = false },
  { start = "{",  end = "}",  close = true,  newline = false },

  { start = "\"", end = "\"", close = true,  newline = false, not_in = ["string"] },
  { start = "'",  end = "'",  close = true,  newline = false, not_in = ["string"] },

  # Angle brackets: auto-close is disabled because `<` and `>` are also
  # used as comparison operators inside expressions, where auto-closing
  # would be incorrect.
  { start = "<",  end = ">",  close = false, newline = false },

  # Backticks appear in template literals inside binding expressions,
  # e.g. [class]="`icon-${name}`"
  { start = "`",  end = "`",  close = true,  newline = false, not_in = ["string"] },
]

[overrides.expression]
# Treats $ as part of a word so double-clicking $event selects the full token.
word_characters = ["$"]
